version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: numbrelos-backend
    ports:
      - "4001:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - numbrelos-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: numbrelos-frontend
    ports:
      - "8080:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:4000
    restart: unless-stopped
    networks:
      - numbrelos-network

networks:
  numbrelos-network:
    driver: bridge
