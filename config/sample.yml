apps:
  - name: heimdall
    image: linuxserver/heimdall:latest
    ports:
      - "8080:80"
    labels:
      - "traefik.enable=true"

services:
  - name: homeassistant
    type: docker
    yaml: |
      version: '3.9'
      services:
        homeassistant:
          image: homeassistant/home-assistant:stable
          container_name: homeassistant
          restart: unless-stopped
          network_mode: host
